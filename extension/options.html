<!DOCTYPE html>
<html>
<head>
  <title>Extension Options</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 760px; }
    label { display: block; margin-top: 10px; font-weight: 600; }
    input, textarea { width: 100%; padding: 8px; margin-top: 8px; box-sizing: border-box; }
    textarea { min-height: 180px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { margin-top: 12px; padding: 8px 16px; }
    .hint { margin-top: 8px; color: #4f4f4f; font-size: 13px; }
    .status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h2>Server Configuration</h2>
  <label for="serverUrl">Server URL:</label>
  <input type="text" id="serverUrl" placeholder="https://your-server.com/api" />

  <label for="popupTemplate">Popup HTML template:</label>
  <textarea id="popupTemplate" placeholder="Use {{response}} to insert server text"></textarea>
  <div class="hint">Naudok <code>{{response}}</code> vietą, kur turi būti parodytas serverio atsakymas.</div>

  <button id="save">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
